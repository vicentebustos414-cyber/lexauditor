version: '3.8'

services:
  # Servicio de Backend (API Segura & IA Auditoría)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Reemplaza con tu llave real de Gemini o configúrala en tu entorno local
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: always

  # Servicio de Frontend (Servidor de estáticos Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
